name: Deploy ML API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/hate-speech-project
            git pull origin main

            # safer stop
            pkill -f "python3 app/app.py" || true

            pip3 install -r requirements.txt --break-system-packages

            # start app
            nohup python3 app/app.py > log.txt 2>&1 &
